<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habitail — Legal</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f6;
      --primary: #5c7a5c;
      --accent: #E07A5F;
      --text: #2d2d2d;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo-icon {
      width: 72px;
      height: 72px;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
    }
    h1 {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }
    p {
      color: var(--muted);
      text-align: center;
      margin-bottom: 40px;
      font-size: 15px;
    }
    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s;
      min-width: 200px;
      text-align: center;
    }
    .card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .card-emoji { font-size: 28px; margin-bottom: 10px; }
    .card-title {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-desc { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="logo-icon">🐾</div>
  <h1>Habitail</h1>
  <p>Daily care for your best friend</p>
  <div class="cards">
    <a href="privacy.html" class="card">
      <div class="card-emoji">🔒</div>
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">How we handle your data</div>
    </a>
    <a href="terms.html" class="card">
      <div class="card-emoji">📄</div>
      <div class="card-title">Terms of Use</div>
      <div class="card-desc">Rules for using Habitail</div>
    </a>
  </div>
</body>
</html>
